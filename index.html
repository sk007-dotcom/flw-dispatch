<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Frank Lloyd Wright — Worldwide Dispatch</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;500;600&family=Oswald:wght@400;500;600&family=Spectral:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
<style>
  :root{
    --paper:#E7E0CF; --paper2:#DED4BF; --panel:#EFE9DA;
    --ink:#28221A; --inkSoft:#5C523F; --line:#BCAE8F;
    --cherokee:#97362B; --cherokeeDeep:#6E261E;
    --ochre:#B5863A; --prairie:#5B6347; --slate:#3E5366; --bark:#7A5230;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      repeating-linear-gradient(0deg, transparent, transparent 47px, rgba(40,34,26,.035) 47px, rgba(40,34,26,.035) 48px),
      var(--paper);
    color:var(--ink);
    font-family:'Spectral', Georgia, serif;
    min-height:100vh;
  }
  .wrap{max-width:1080px;margin:0 auto;padding:0 22px 64px;}
  a{color:inherit;}
  .topband{height:7px;background:var(--cherokee);}

  .header{display:flex;gap:26px;align-items:stretch;padding:30px 0 26px;border-bottom:2px solid var(--ink);}
  .glasswrap{flex:0 0 auto;display:flex;align-items:center;}
  .htext{display:flex;flex-direction:column;justify-content:center;min-width:0;}
  .eyebrow{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.26em;
    font-size:.66rem;color:var(--cherokee);font-weight:600;margin-bottom:10px;}
  .title{font-family:'Josefin Sans',sans-serif;text-transform:uppercase;font-weight:600;
    letter-spacing:.11em;line-height:.96;font-size:clamp(2rem,6vw,3.9rem);margin:0;color:var(--ink);}
  .subtitle{font-style:italic;color:var(--inkSoft);margin-top:12px;
    font-size:clamp(.92rem,2.2vw,1.06rem);max-width:48ch;line-height:1.5;}

  .controls{display:flex;flex-wrap:wrap;gap:16px;justify-content:space-between;align-items:flex-end;padding:22px 0 6px;}
  .tabs{display:flex;flex-wrap:wrap;gap:0;}
  .tab{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.12em;
    font-size:.72rem;font-weight:500;color:var(--inkSoft);background:none;border:none;
    padding:9px 14px;cursor:pointer;border-bottom:2px solid transparent;transition:color .18s,border-color .18s;}
  .tab:hover{color:var(--ink);}
  .tab.on{color:var(--ink);border-bottom-color:var(--cherokee);}
  .tab .ct{font-size:.62rem;color:var(--line);margin-left:6px;}
  .tab.on .ct{color:var(--cherokee);}
  .tab:focus-visible{outline:2px solid var(--cherokee);outline-offset:2px;}

  .rightctl{display:flex;gap:10px;align-items:center;}
  .search{font-family:'Spectral',serif;font-size:.9rem;color:var(--ink);
    background:var(--paper2);border:1px solid var(--line);border-radius:0;padding:8px 12px;width:175px;outline:none;}
  .search:focus{border-color:var(--cherokee);}
  .search::placeholder{color:var(--inkSoft);opacity:.7;}
  .refresh{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.14em;
    font-size:.7rem;font-weight:500;color:var(--paper);background:var(--ink);
    border:none;padding:9px 16px;cursor:pointer;transition:background .18s;}
  .refresh:hover{background:var(--cherokeeDeep);}
  .refresh:disabled{opacity:.5;cursor:default;}
  .refresh:focus-visible{outline:2px solid var(--cherokee);outline-offset:2px;}

  .meta{font-family:'Oswald',sans-serif;font-size:.66rem;letter-spacing:.14em;
    text-transform:uppercase;color:var(--inkSoft);padding:12px 0 0;min-height:1em;}
  .meta.warn{color:var(--cherokee);}

  .grid{display:grid;gap:0;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));
    margin-top:18px;border-top:1px solid var(--line);}
  .card{border-bottom:1px solid var(--line);border-right:1px solid var(--line);
    padding:20px 22px 22px;position:relative;display:flex;flex-direction:column;min-height:172px;
    animation:rise .5s ease both;}
  @media(prefers-reduced-motion:reduce){.card{animation:none;}}
  @keyframes rise{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent,var(--cherokee));}
  .crow{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
  .chip{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.13em;
    font-size:.6rem;font-weight:600;color:var(--paper);background:var(--accent);padding:3px 8px;}
  .when{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.1em;
    font-size:.62rem;color:var(--inkSoft);}
  .ctitle{font-weight:600;font-size:1.1rem;line-height:1.36;color:var(--ink);margin:0 0 14px;flex:1;}
  .ctitle a{text-decoration:none;}
  .ctitle a:hover{color:var(--cherokeeDeep);text-decoration:underline;}
  .cfoot{display:flex;justify-content:space-between;align-items:center;gap:10px;border-top:1px solid var(--line);padding-top:11px;}
  .src{font-family:'Oswald',sans-serif;font-size:.64rem;letter-spacing:.08em;text-transform:uppercase;
    color:var(--inkSoft);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .src b{color:var(--ink);font-weight:600;}
  .read{font-family:'Oswald',sans-serif;font-size:.64rem;letter-spacing:.14em;text-transform:uppercase;
    color:var(--cherokee);text-decoration:none;white-space:nowrap;font-weight:600;}
  .read:hover{text-decoration:underline;}
  .read:focus-visible{outline:2px solid var(--cherokee);outline-offset:2px;}

  .state{padding:84px 0;text-align:center;}
  .state h3{font-family:'Josefin Sans',sans-serif;text-transform:uppercase;letter-spacing:.1em;
    font-weight:500;font-size:1.3rem;margin:18px 0 8px;}
  .state p{font-style:italic;color:var(--inkSoft);margin:0 auto;max-width:40ch;line-height:1.55;}
  .draftline{height:2px;background:var(--cherokee);margin:0 auto;width:0;animation:draw 1.3s ease-in-out infinite;}
  @keyframes draw{0%{width:0;}50%{width:220px;}100%{width:0;}}
  @media(prefers-reduced-motion:reduce){.draftline{width:160px;animation:none;}}

  .foot{font-family:'Oswald',sans-serif;font-size:.62rem;letter-spacing:.13em;text-transform:uppercase;
    color:var(--inkSoft);text-align:center;padding-top:38px;line-height:1.8;opacity:.85;}

  @media(max-width:620px){
    .glasswrap{display:none;}
    .search{width:130px;}
    .controls{align-items:stretch;}
  }
</style>
</head>
<body>
  <div class="topband"></div>
  <div class="wrap">
    <header class="header">
      <div class="glasswrap">
        <svg viewBox="0 0 110 380" height="150" aria-hidden="true">
          <rect x="3" y="3" width="104" height="374" fill="none" stroke="#5C523F" stroke-width="1.4"/>
          <line x1="3" y1="110" x2="107" y2="110" stroke="#5C523F" stroke-width="1.2"/>
          <line x1="3" y1="360" x2="107" y2="360" stroke="#5C523F" stroke-width="1.6"/>
          <line x1="3" y1="351" x2="107" y2="351" stroke="#5C523F" stroke-width="1.6"/>
          <line x1="37" y1="360" x2="37" y2="118" stroke="#5C523F" stroke-width="1.4"/>
          <line x1="55" y1="360" x2="55" y2="118" stroke="#5C523F" stroke-width="1.4"/>
          <line x1="73" y1="360" x2="73" y2="118" stroke="#5C523F" stroke-width="1.4"/>
          <line x1="19" y1="110" x2="19" y2="360" stroke="#BCAE8F" stroke-width="1"/>
          <line x1="91" y1="110" x2="91" y2="360" stroke="#BCAE8F" stroke-width="1"/>
          <g id="canopy"></g>
        </svg>
      </div>
      <div class="htext">
        <div class="eyebrow">世界の最新情報 · Worldwide Dispatch</div>
        <h1 class="title">Frank&nbsp;Lloyd<br/>Wright</h1>
        <p class="subtitle">有機的建築をめぐる、世界各地からの便り。開くたびに最新ニュースを無料で自動取得します。</p>
      </div>
    </header>

    <div class="controls">
      <div class="tabs" id="tabs"></div>
      <div class="rightctl">
        <input class="search" id="search" placeholder="キーワード検索" aria-label="キーワード検索" />
        <button class="refresh" id="refresh">更新</button>
      </div>
    </div>

    <div class="meta" id="meta"></div>
    <div id="content"></div>

    <div class="foot">
      無料のGoogleニュース検索を情報源に、ブラウザ上で自動取得しています<br/>
      見出しは各メディアのもの · 詳細は出典リンク先をご確認ください
    </div>
  </div>

<script>
/* ─────────── Category meta + keyword heuristics ─────────── */
const CATS = {
  News:         { ja:"ニュース",     color:"#97362B" },
  Exhibition:   { ja:"展覧会",       color:"#B5863A" },
  Preservation: { ja:"保存・修復",   color:"#5B6347" },
  Market:       { ja:"市場",         color:"#7A5230" },
  Media:        { ja:"書籍・映像",   color:"#3E5366" },
  Travel:       { ja:"見学・旅",     color:"#8A6D3B" },
};
const ORDER = ["News","Exhibition","Preservation","Market","Media","Travel"];
const KW = {
  Exhibition:   ["exhibit","exhibition","museum","gallery","retrospective","展","展覧","美術館","ギャラリー","回顧"],
  Preservation: ["restor","preserv","conserv","renovat","repair","save","roof","leak","保存","修復","改修","復元","解体","老朽"],
  Market:       ["sale","sells","sold","auction","listing","market","real estate","mansion","for sale","million","売却","落札","オークション","競売","販売","売り","億","万ドル","不動産"],
  Media:        ["book","film","documentary","novel","memoir","podcast","series","本","書籍","映画","ドキュメンタリー","小説","新刊"],
  Travel:       ["tour","visit","hotel","stay","airbnb","travel","open to the public","見学","ツアー","旅","ホテル","宿泊","公開"],
};
function classify(title){
  const t=(title||"").toLowerCase();
  for(const cat of ["Market","Preservation","Exhibition","Media","Travel"]){
    if(KW[cat].some(k=>t.includes(k.toLowerCase()))) return cat;
  }
  return "News";
}

/* ─────────── Built-in fallback (shown if every live source fails) ─────────── */
const FALLBACK = [
  {category:"Preservation",title:"落水荘、3年・約700万ドルの大規模保存修復が完了",source:"Dezeen",date:"2026年4月",url:"https://www.dezeen.com/2026/04/01/fallingwater-frank-lloyd-wright-architectural-preservation-studio/"},
  {category:"Market",title:"ライト最後の設計「サークル・サン・ハウス」が880万ドルで売り出し",source:"Artnet News",date:"2026年2月",url:"https://news.artnet.com/art-world/frank-lloyd-wright-norman-lykes-house-sale-2742659"},
  {category:"Preservation",title:"グレイクリフ邸に600万ドルの新ビジターセンターが完成",source:"Buffalo Rising",date:"2026年3月",url:"https://www.buffalorising.com/2026/03/completion-of-a-new-6-million-visitor-center-at-the-frank-lloyd-wright-designed-graycliff-estate/"},
  {category:"Media",title:"新刊『The Killer and Frank Lloyd Wright』が話題に",source:"CounterPunch",date:"2026年5月",url:"https://www.counterpunch.org/2026/05/22/frank-lloyd-wright-and-the-mass-murderer-at-taliesen/"},
  {category:"Exhibition",title:"ビンガムトン大学美術館で図面展「Drawing Connections」",source:"WBNG",date:"2026年2月",url:"https://www.wbng.com/2026/02/20/binghamton-university-art-museum-showcases-frank-lloyd-wright-drawings/"},
  {category:"News",title:"ライト建築保存協会、2026年次総会をスコッツデールで開催",source:"FLW Building Conservancy",date:"2026年11月",url:"https://savewright.org/"},
  {category:"Preservation",title:"プライスタワー、訴訟が決着し新オーナーが大規模改修を計画",source:"Dezeen",date:"2026年3月",url:"https://www.dezeen.com/2026/04/23/frank-lloyd-wright-preservation-projects-round-up/"},
  {category:"Travel",title:"日本で見学できるライト建築 ― 明日館・ヨドコウ・帝国ホテル",source:"豊田市美術館ほか",date:"通年",url:"https://www.museum.toyota.aichi.jp/exhibition/frank_lloyd_wright/"},
];

/* ─────────── Free live fetch: Google News RSS via multiple providers ─────────── */
const FEEDS = [
  'https://news.google.com/rss/search?q=%22Frank%20Lloyd%20Wright%22&hl=ja&gl=JP&ceid=JP:ja',
  'https://news.google.com/rss/search?q=%22Frank%20Lloyd%20Wright%22&hl=en-US&gl=US&ceid=US:en'
];

async function fetchT(url, ms){
  const ctrl=new AbortController();
  const id=setTimeout(()=>ctrl.abort(), ms||9000);
  try{
    const r=await fetch(url,{cache:'no-store',signal:ctrl.signal});
    if(!r.ok) throw new Error('HTTP '+r.status);
    return r;
  } finally { clearTimeout(id); }
}

function parseXml(xmlText){
  const xml=new DOMParser().parseFromString(xmlText,'text/xml');
  return [...xml.querySelectorAll('item')].map(it=>{
    const g=s=>{const n=it.querySelector(s);return n?n.textContent.trim():'';};
    return { title:g('title'), url:g('link'), source:g('source'), date:g('pubDate') };
  });
}

/* Each provider takes a feed URL and returns raw items [{title,url,source,date}] */
const PROVIDERS = [
  // 1) rss2json — returns clean JSON, CORS-enabled, no key needed
  async (feed)=>{
    const api='https://api.rss2json.com/v1/api.json?rss_url='+encodeURIComponent(feed)+'&count=40';
    const r=await fetchT(api);
    const j=await r.json();
    if(j.status!=='ok' || !Array.isArray(j.items)) throw new Error('rss2json status');
    return j.items.map(it=>({ title:it.title||'', url:it.link||'', source:it.author||'', date:it.pubDate||'' }));
  },
  // 2) allorigins (JSON wrapper) — very permissive CORS
  async (feed)=>{
    const api='https://api.allorigins.win/get?url='+encodeURIComponent(feed);
    const r=await fetchT(api);
    const j=await r.json();
    const xml=(j&&j.contents)||'';
    if(xml.indexOf('<item')===-1) throw new Error('allorigins/get empty');
    return parseXml(xml);
  },
  // 3) allorigins (raw)
  async (feed)=>{
    const api='https://api.allorigins.win/raw?url='+encodeURIComponent(feed);
    const r=await fetchT(api);
    const t=await r.text();
    if(t.indexOf('<item')===-1) throw new Error('allorigins/raw empty');
    return parseXml(t);
  },
  // 4) corsproxy.io
  async (feed)=>{
    const api='https://corsproxy.io/?url='+encodeURIComponent(feed);
    const r=await fetchT(api);
    const t=await r.text();
    if(t.indexOf('<item')===-1) throw new Error('corsproxy empty');
    return parseXml(t);
  },
];

async function loadOneFeed(feed){
  let lastErr;
  for(const p of PROVIDERS){
    try{ const items=await p(feed); if(items&&items.length) return items; }
    catch(e){ lastErr=e; }
  }
  throw lastErr||new Error('no provider succeeded');
}

async function loadFeeds(){
  const all=[]; let ok=false, lastErr;
  for(const f of FEEDS){
    try{ all.push(...await loadOneFeed(f)); ok=true; }
    catch(e){ lastErr=e; }
  }
  if(!ok) throw lastErr||new Error('all feeds failed');
  return all;
}

/* normalize + dedupe + sort newest first */
function normalize(raw){
  let title=(raw.title||'').replace(/\s+/g,' ').trim();
  let source=(raw.source||'').trim();
  const url=(raw.url||'').trim();
  if(!source){
    const i=title.lastIndexOf(' - ');
    if(i>0){ source=title.slice(i+3); title=title.slice(0,i); }
  } else if(title.endsWith(' - '+source)){
    title=title.slice(0,-(source.length+3));
  }
  return { title, url, source, date:(raw.date||'').trim() };
}
function buildItems(rawList){
  const seen=new Set(); const out=[];
  for(const r of rawList){
    const it=normalize(r);
    if(!it.title||!it.url) continue;
    const key=it.title.toLowerCase().replace(/[^a-z0-9ぁ-んァ-ヶ一-龠]/g,'').slice(0,60);
    if(!key||seen.has(key)) continue;
    seen.add(key);
    it._t=Date.parse(it.date)||0;
    it.category=classify(it.title);
    out.push(it);
  }
  out.sort((a,b)=>b._t-a._t);
  return out.slice(0,30);
}

/* ─────────── State + rendering ─────────── */
let ITEMS=[], COUNTS={}, active="All", query="", fetchedAt=null, loading=true, source="live";

(function(){ /* art-glass canopy */
  const g=document.getElementById("canopy"); const ns="http://www.w3.org/2000/svg";
  [28,46,64].forEach(y=>[19,37,55,73,91].forEach(x=>{
    const fill=(x+y)%4===0?"#97362B":(x%3===0?"#B5863A":"#5B6347");
    const r=document.createElementNS(ns,"rect");
    r.setAttribute("x",x-4);r.setAttribute("y",y-4);r.setAttribute("width",8);r.setAttribute("height",8);r.setAttribute("fill",fill);
    g.appendChild(r);
  }));
  [150,200,250].forEach(y=>[37,55,73].forEach(x=>{
    const r=document.createElementNS(ns,"rect");
    r.setAttribute("x",x-3);r.setAttribute("y",y-3);r.setAttribute("width",6);r.setAttribute("height",6);
    r.setAttribute("fill",y===200?"#97362B":"#B5863A");g.appendChild(r);
  }));
})();

function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function fmtDate(d){
  if(!d) return "";
  const t=Date.parse(d);
  if(!t) return d; /* fallback: show raw string like "2026年4月" */
  try{ return new Intl.DateTimeFormat("ja-JP",{year:"numeric",month:"long",day:"numeric"}).format(new Date(t)); }
  catch(_){ return new Date(t).toLocaleDateString(); }
}
function fmtTime(d){
  if(!d) return "";
  try{ return new Intl.DateTimeFormat("ja-JP",{month:"long",day:"numeric",hour:"2-digit",minute:"2-digit"}).format(d); }
  catch(_){ return d.toLocaleString(); }
}

function setCounts(){ COUNTS=ITEMS.reduce((m,it)=>{const k=CATS[it.category]?it.category:"News";m[k]=(m[k]||0)+1;return m;},{}); }

function buildTabs(){
  const t=document.getElementById("tabs");
  const mk=(key,label,count)=>{
    const b=document.createElement("button");
    b.className="tab"+(active===key?" on":"");
    b.innerHTML=label+'<span class="ct">'+count+'</span>';
    b.onclick=()=>{active=key;render();};
    return b;
  };
  t.innerHTML="";
  t.appendChild(mk("All","すべて",ITEMS.length));
  ORDER.forEach(k=>t.appendChild(mk(k,CATS[k].ja,COUNTS[k]||0)));
}

function render(){
  buildTabs();
  const meta=document.getElementById("meta");
  const c=document.getElementById("content");

  if(loading){
    meta.className="meta"; meta.textContent="ウェブを検索しています";
    c.innerHTML='<div class="state"><div class="draftline"></div><h3>製図中</h3><p>世界のニュースから、ライトをめぐる最新の記事を集めています。</p></div>';
    return;
  }

  const q=query.trim().toLowerCase();
  const items=ITEMS.filter(it=>{
    const inCat=active==="All"||it.category===active;
    const inQ=!q||[it.title,it.source].some(f=>f&&String(f).toLowerCase().includes(q));
    return inCat&&inQ;
  });

  if(source==="live"){
    meta.className="meta";
    meta.textContent=(fetchedAt?("最終更新 "+fmtTime(fetchedAt)+" · "):"")+"表示 "+items.length+" 件 / 全 "+ITEMS.length+" 件";
  } else {
    meta.className="meta warn";
    meta.textContent="ライブ取得に失敗 · 保存済みの情報を表示中（「更新」で再試行）";
  }

  if(!items.length){
    c.innerHTML='<div class="state"><h3>該当なし</h3><p>この条件に合う便りは見つかりませんでした。フィルターを変えてみてください。</p></div>';
    return;
  }
  let html='<div class="grid">';
  items.forEach((it,i)=>{
    const cat=CATS[it.category]||CATS.News; const delay=Math.min(i,8)*40;
    const d=fmtDate(it.date);
    html+='<article class="card" style="--accent:'+cat.color+';animation-delay:'+delay+'ms">'
      +'<div class="crow"><span class="chip" style="--accent:'+cat.color+'">'+cat.ja+'</span>'
      +(d?'<span class="when">'+esc(d)+'</span>':'')+'</div>'
      +'<h2 class="ctitle"><a href="'+esc(it.url)+'" target="_blank" rel="noopener noreferrer">'+esc(it.title)+'</a></h2>'
      +'<div class="cfoot"><span class="src"><b>'+esc(it.source||"出典")+'</b></span>'
      +'<a class="read" href="'+esc(it.url)+'" target="_blank" rel="noopener noreferrer">記事を読む →</a>'
      +'</div></article>';
  });
  html+='</div>';
  c.innerHTML=html;
}

function useFallback(){
  ITEMS=FALLBACK.map(it=>({...it,_t:0}));
  source="fallback"; fetchedAt=null;
  setCounts();
}

async function load(){
  loading=true; render();
  const rbtn=document.getElementById("refresh"); if(rbtn) rbtn.disabled=true;
  try{
    const raw=await loadFeeds();
    const items=buildItems(raw);
    if(!items.length) throw new Error("empty");
    ITEMS=items; source="live"; fetchedAt=new Date();
    setCounts();
  }catch(e){
    useFallback();
  }
  loading=false;
  if(rbtn) rbtn.disabled=false;
  render();
}

document.getElementById("search").addEventListener("input",e=>{query=e.target.value;render();});
document.getElementById("refresh").addEventListener("click",load);
load();
</script>
</body>
</html>
